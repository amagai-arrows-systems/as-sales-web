name: AS-SALES-WEB MCP server
version: 0.0.1
schema: v1
  
mcpServers:
  - name: serena_as_sales_web
    command: wsl
    args:
      - -d
      - Ubuntu-24.04
      - --
      - docker
      - exec
      - -i
      - serena_mcp
      - serena
      - start-mcp-server
      - --transport
      - stdio
      - --context
      - ide-assistant
      - --project
      - /workspaces/pdev/apps/as-sales-web
